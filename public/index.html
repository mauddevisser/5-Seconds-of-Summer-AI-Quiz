<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 Seconds of Summer Quiz</title>
    <script defer type="module" src="./app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
</head>

<body>
    <h1>5 Seconds of Summer Quiz</h1>
    <div id="start-screen">
        <button id="startQuizButton">Start Quiz</button>
    </div>
    <div id="score-board"> Score: <span id="current-score">0</span>
        <button id="muteButton" class="sound-on">Sound On</button>
    </div>
    <div id="chat-container">
    </div>

    <div class="input-area">
        <input type="text" placeholder="Type your message..." id="promptInput">
        <button id="micButton">🎤</button><button id="sendButton">Send</button>
    </div>
</body>

</html>
